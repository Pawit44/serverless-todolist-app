version: '3.8'
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: todolist
    ports:
      - "5432:5432"

  backend:
    build: 
      context: ./app/backend
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_USER=myuser
      - DB_PASSWORD=mypassword
      - DB_NAME=todolist
    depends_on:
      - db

  frontend:
    build: 
      context: ./app/frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend