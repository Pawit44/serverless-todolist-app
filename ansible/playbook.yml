---
- name: Prepare Environment for Kubernetes
  hosts: local
  tasks:
    # 1. สร้าง Directory สำหรับเก็บไฟล์ Deploy
    - name: Create deployment directory
      file:
        path: /tmp/k8s-deployment
        state: directory
        mode: '0755'

    # 2. ตรวจสอบว่า Docker ติดตั้งอยู่และใช้งานได้ (Check dependencies)
    - name: Verify Docker installation
      command: docker --version
      register: docker_output
      changed_when: false

    - name: Show Docker version
      debug:
        msg: "System is ready with {{ docker_output.stdout }}"

    # 3. เตรียมไฟล์ Config พื้นฐาน
    - name: Create app logs directory
      file:
        path: "{{ item }}"
        state: directory
      loop:
        - "./logs/frontend"
        - "./logs/backend"