grafana:
  #usename: admin
  adminPassword: prom-operator
  defaultDashboardsTimezone: Asia/Bangkok
  
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
      - name: 'default'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/default 
  dashboards:
    default:
      node-js-dashboard:
        gnetId: 14430
        revision: 1
        datasource: Prometheus